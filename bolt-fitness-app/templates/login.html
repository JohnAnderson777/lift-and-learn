{% extends "base.html" %}

{% block title %}Login - Lift N' Learn{% endblock %}

{% block navbar %}{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-brand">
                <img src="{{ url_for('static', filename='image copy.png') }}" alt="Dumbbell" class="auth-brand-icon">
                <div class="auth-brand-text">
                    <span class="auth-brand-title">Lift N' Learn</span>
                    <span class="auth-brand-slogan">Planning for Progress</span>
                </div>
            </div>
        </div>

        <div class="auth-tabs">
            <a href="{{ url_for('login') }}" class="tab active">Login</a>
            <a href="{{ url_for('register') }}" class="tab">Sign Up</a>
        </div>

        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="btn btn-primary">Login</button>
        </form>
    </div>
</div>
{% endblock %}
