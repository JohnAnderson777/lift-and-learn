{% extends "base.html" %}

{% block title %}Sign Up - Lift N' Learn{% endblock %}

{% block navbar %}{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-brand">
                <img src="{{ url_for('static', filename='image copy.png') }}" alt="Dumbbell" class="auth-brand-icon">
                <div class="auth-brand-text">
                    <span class="auth-brand-title">Lift N' Learn</span>
                    <span class="auth-brand-slogan">Planning for Progress</span>
                </div>
            </div>
        </div>

        <div class="auth-tabs">
            <a href="{{ url_for('login') }}" class="tab">Login</a>
            <a href="{{ url_for('register') }}" class="tab active">Sign Up</a>
        </div>

        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
                <span class="field-error-msg" id="password-error" style="display:none;"></span>
            </div>

            <button type="submit" class="btn btn-primary">Create Account</button>
        </form>

        <script>
        document.querySelector('.auth-form').addEventListener('submit', function(e) {
            const passwordInput = document.getElementById('password');
            const passwordError = document.getElementById('password-error');
            const password = passwordInput.value;
            let valid = true;

            passwordInput.classList.remove('input-error');
            passwordError.style.display = 'none';
            passwordError.textContent = '';

            if (password.length <= 6) {
                passwordInput.classList.add('input-error');
                passwordError.textContent = 'Password must be more than 6 characters.';
                passwordError.style.display = 'block';
                valid = false;
            } else if (!/[0-9!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?`~]/.test(password)) {
                passwordInput.classList.add('input-error');
                passwordError.textContent = 'Password must contain at least one number or special character.';
                passwordError.style.display = 'block';
                valid = false;
            }

            if (!valid) e.preventDefault();
        });

        document.getElementById('password').addEventListener('input', function() {
            this.classList.remove('input-error');
            const err = document.getElementById('password-error');
            err.style.display = 'none';
            err.textContent = '';
        });
        </script>

        <p class="auth-footer">
            By signing up, you agree to our terms and conditions
        </p>
    </div>
</div>
{% endblock %}
